<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"><title>PWA App</title><link rel="manifest" href="manifest.json"><script src="https://cdn.tailwindcss.com"></script><style>body{margin:0;padding:0;background-color:#030712;font-family:system-ui;min-height:100vh;display:flex;align-items:center;justify-content:center;}#root{width:100%;display:flex;justify-content:center;align-items:center;}</style></head><body><div id="root"></div><script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script><script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script><script>// Composant monolithique LB Reaactor - Mode Père Seul (toggle switch)
// Toggle discret, descriptions contextuelles, notifications temporaires

const {
  useState,
  useEffect,
  useCallback,
  useRef
} = React;
const GenoGraph = () => {
  const [selectedNodeId, setSelectedNodeId] = useState(null);
  const [deleteMode, setDeleteMode] = useState(false);
  const [currentSection, setCurrentSection] = useState('section-default');
  const [historyUndo, setHistoryUndo] = useState([]);
  const [historyRedo, setHistoryRedo] = useState([]);
  const [libsReady, setLibsReady] = useState(false);
  const [editingName, setEditingName] = useState('');
  const [singleParentMode, setSingleParentMode] = useState(false);
  const [showChildGenderPicker, setShowChildGenderPicker] = useState(false);
  const [pendingParentId, setPendingParentId] = useState(null);
  const [notification, setNotification] = useState({
    show: false,
    message: '',
    type: ''
  });
  const nodesRef = useRef(null);
  const edgesRef = useRef(null);
  const networkRef = useRef(null);
  const containerRef = useRef(null);
  const deleteModeRef = useRef(deleteMode);
  const debounceTimerRef = useRef(null);
  const fileInputRef = useRef(null);
  const notificationTimerRef = useRef(null);
  useEffect(() => {
    deleteModeRef.current = deleteMode;
  }, [deleteMode]);

  // Fonction pour afficher une notification temporaire
  const showNotification = (message, type = 'info') => {
    if (notificationTimerRef.current) clearTimeout(notificationTimerRef.current);
    setNotification({
      show: true,
      message,
      type
    });
    notificationTimerRef.current = setTimeout(() => {
      setNotification({
        show: false,
        message: '',
        type: ''
      });
    }, 3000);
  };
  const getInputValue = (id, defaultValue = '') => document.getElementById(id)?.value || defaultValue;
  const setInputValue = (id, value) => {
    const el = document.getElementById(id);
    if (el) el.value = value;
  };
  const saveToLocalStorage = useCallback(() => {
    if (nodesRef.current && edgesRef.current) {
      const data = {
        nodes: nodesRef.current.get(),
        edges: edgesRef.current.get()
      };
      localStorage.setItem('genograph_persistent_backup', JSON.stringify(data));
    }
  }, []);
  const saveState = useCallback(() => {
    if (nodesRef.current && edgesRef.current) {
      setHistoryUndo(prev => [...prev, {
        nodes: nodesRef.current.get(),
        edges: edgesRef.current.get()
      }]);
      setHistoryRedo([]);
    }
  }, []);
  const cancelAction = useCallback(() => {
    setSelectedNodeId(null);
    setShowChildGenderPicker(false);
    setPendingParentId(null);
    setCurrentSection(!nodesRef.current || nodesRef.current.get().length === 0 ? 'section-default' : 'section-idle');
  }, []);
  const undo = useCallback(() => {
    if (historyUndo.length === 0) return;
    const prevState = historyUndo[historyUndo.length - 1];
    setHistoryRedo(prev => [...prev, {
      nodes: nodesRef.current.get(),
      edges: edgesRef.current.get()
    }]);
    setHistoryUndo(prev => prev.slice(0, -1));
    nodesRef.current.clear();
    edgesRef.current.clear();
    nodesRef.current.add(prevState.nodes);
    edgesRef.current.add(prevState.edges);
    saveToLocalStorage();
    cancelAction();
    updateNodeStyles();
    showNotification('Annulation effectuée', 'success');
  }, [historyUndo, saveToLocalStorage, cancelAction]);
  const redo = useCallback(() => {
    if (historyRedo.length === 0) return;
    const nextState = historyRedo[historyRedo.length - 1];
    setHistoryRedo(prev => prev.slice(0, -1));
    setHistoryUndo(prev => [...prev, {
      nodes: nodesRef.current.get(),
      edges: edgesRef.current.get()
    }]);
    nodesRef.current.clear();
    edgesRef.current.clear();
    nodesRef.current.add(nextState.nodes);
    edgesRef.current.add(nextState.edges);
    saveToLocalStorage();
    cancelAction();
    updateNodeStyles();
    showNotification('Rétablissement effectué', 'success');
  }, [historyRedo, saveToLocalStorage, cancelAction]);

  // Mise à jour des couleurs des femmes : rose si a au moins un parent, jaune sinon
  const updateNodeStyles = useCallback(() => {
    if (!nodesRef.current || !edgesRef.current) return;
    const nodes = nodesRef.current.get();
    const edges = edgesRef.current.get();
    nodes.forEach(node => {
      if (node.shape === 'box' && node.gender === 'F') {
        const hasParent = edges.some(edge => edge.to === node.id);
        const newColor = hasParent ? {
          background: '#701a75',
          border: '#ec4899'
        } : {
          background: '#eab308',
          border: '#ca8a04'
        };
        const currentColor = node.color;
        if (currentColor.background !== newColor.background) {
          nodesRef.current.update({
            id: node.id,
            color: newColor
          });
        }
      }
    });
  }, []);
  const clearAll = useCallback(() => {
    if (!nodesRef.current || !edgesRef.current) return;
    if (nodesRef.current.get().length === 0 && edgesRef.current.get().length === 0) return;
    if (window.confirm("Effacer tout le graphe ?")) {
      saveState();
      nodesRef.current.clear();
      edgesRef.current.clear();
      saveToLocalStorage();
      cancelAction();
      updateNodeStyles();
      showNotification('Graphe entièrement effacé', 'warning');
    }
  }, [saveState, saveToLocalStorage, cancelAction, updateNodeStyles]);
  const importFromFile = useCallback(event => {
    const file = event.target.files[0];
    if (!file) return;
    if (!window.confirm("Importer un fichier remplacera tout le graphe actuel. Continuer ?")) {
      if (fileInputRef.current) fileInputRef.current.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.nodes || !data.edges) throw new Error("Format invalide");
        nodesRef.current.clear();
        edgesRef.current.clear();
        setHistoryUndo([]);
        setHistoryRedo([]);
        data.nodes.forEach(node => {
          if (node.shape === 'box' && !node.gender) {
            if (node.color && node.color.background === '#1e3a8a') node.gender = 'M';else if (node.color && node.color.background === '#701a75') node.gender = 'F';else node.gender = 'M';
          }
        });
        nodesRef.current.add(data.nodes);
        edgesRef.current.add(data.edges);
        saveToLocalStorage();
        cancelAction();
        if (networkRef.current) networkRef.current.fit();
        updateNodeStyles();
        showNotification('Import réussi !', 'success');
      } catch (err) {
        alert("Erreur lors de l'import : " + err.message);
      } finally {
        if (fileInputRef.current) fileInputRef.current.value = '';
      }
    };
    reader.readAsText(file);
  }, [saveToLocalStorage, cancelAction, updateNodeStyles]);
  const saveCurrentPositions = useCallback(() => {
    if (networkRef.current && nodesRef.current) {
      const positions = networkRef.current.getPositions();
      nodesRef.current.forEach(node => {
        if (positions[node.id]) nodesRef.current.update({
          id: node.id,
          x: positions[node.id].x,
          y: positions[node.id].y
        });
      });
    }
  }, []);
  const createPersonNode = useCallback((id, label, gender, x, y) => {
    const color = gender === 'M' ? {
      background: '#1e3a8a',
      border: '#3b82f6'
    } : {
      background: '#701a75',
      border: '#ec4899'
    };
    nodesRef.current.add({
      id,
      label,
      shape: 'box',
      x,
      y,
      color,
      font: {
        color: '#fff',
        face: 'Tajawal'
      },
      gender
    });
  }, []);
  const createUnionNode = useCallback((id, x, y) => {
    nodesRef.current.add({
      id,
      label: '',
      shape: 'dot',
      size: 7,
      color: '#10b981',
      x,
      y,
      font: {
        face: 'Tajawal'
      }
    });
  }, []);
  const createRootPerson = useCallback(() => {
    const name = getInputValue('init-name', 'Laiche Brahim');
    const gender = getInputValue('init-gender', 'M');
    const id = 'p_' + Date.now();
    saveState();
    createPersonNode(id, name, gender, 0, 0);
    saveToLocalStorage();
    setInputValue('init-name', '');
    cancelAction();
    updateNodeStyles();
    showNotification(`Personne "${name}" créée`, 'success');
  }, [saveState, createPersonNode, saveToLocalStorage, cancelAction, updateNodeStyles]);

  // --- Mode normal : conjoint via union ---
  const prepareAddUnion = () => setCurrentSection('section-add-union');
  const executeAddUnion = useCallback(() => {
    if (!selectedNodeId) return;
    const spouseName = getInputValue('spouse-name', 'Conjoint');
    const spouseGender = getInputValue('spouse-gender', 'F');
    const spouseId = 'p_' + Date.now();
    const unionId = 'u_' + Date.now();
    saveCurrentPositions();
    saveState();
    const positions = networkRef.current?.getPositions() || {};
    const pPos = positions[selectedNodeId] || {
      x: 0,
      y: 0
    };
    const spouseX = pPos.x + 160,
      spouseY = pPos.y;
    const unionX = pPos.x + 80,
      unionY = pPos.y + 45;
    createPersonNode(spouseId, spouseName, spouseGender, spouseX, spouseY);
    createUnionNode(unionId, unionX, unionY);
    edgesRef.current.add([{
      from: selectedNodeId,
      to: unionId
    }, {
      from: spouseId,
      to: unionId
    }]);
    saveToLocalStorage();
    setInputValue('spouse-name', '');
    cancelAction();
    updateNodeStyles();
    showNotification(`Conjoint(e) "${spouseName}" ajouté(e)`, 'success');
  }, [selectedNodeId, saveCurrentPositions, saveState, createPersonNode, createUnionNode, saveToLocalStorage, cancelAction, updateNodeStyles]);

  // --- Mode Père Seul : ajout enfant avec sélection rapide ---
  const requestChildCreation = useCallback(() => {
    if (!selectedNodeId) return;
    setPendingParentId(selectedNodeId);
    setShowChildGenderPicker(true);
  }, [selectedNodeId]);
  const createChildWithGender = useCallback(gender => {
    if (!pendingParentId) return;
    const defaultName = gender === 'M' ? 'Fils' : 'Fille';
    const childId = 'p_' + Date.now();
    saveCurrentPositions();
    saveState();
    const positions = networkRef.current?.getPositions() || {};
    const parentPos = positions[pendingParentId] || {
      x: 0,
      y: 0
    };
    const existingChildren = edgesRef.current.get({
      filter: item => item.from === pendingParentId && item.to !== undefined
    });
    let offsetX = 0;
    if (existingChildren.length) {
      const step = 160;
      const sign = existingChildren.length % 2 === 1 ? 1 : -1;
      const multiplier = Math.ceil(existingChildren.length / 2);
      offsetX = sign * multiplier * step;
    }
    const childX = parentPos.x + offsetX,
      childY = parentPos.y + 80;
    createPersonNode(childId, defaultName, gender, childX, childY);
    edgesRef.current.add({
      from: pendingParentId,
      to: childId,
      arrows: 'to'
    });
    saveToLocalStorage();
    cancelAction();
    updateNodeStyles();
    setShowChildGenderPicker(false);
    setPendingParentId(null);
    showNotification(`Enfant "${defaultName}" ajouté`, 'success');
  }, [pendingParentId, saveCurrentPositions, saveState, createPersonNode, saveToLocalStorage, cancelAction, updateNodeStyles]);

  // --- Mode normal : parents (père + mère + union) ---
  const executeAddParents = useCallback(() => {
    if (!selectedNodeId) return;
    saveCurrentPositions();
    saveState();
    const positions = networkRef.current?.getPositions() || {};
    const childPos = positions[selectedNodeId] || {
      x: 0,
      y: 0
    };
    const fatherId = 'p_f_' + Date.now();
    const motherId = 'p_m_' + Date.now();
    const unionId = 'u_p_' + Date.now();
    const unionX = childPos.x,
      unionY = childPos.y - 55;
    const fatherX = childPos.x - 80,
      fatherY = childPos.y - 100;
    const motherX = childPos.x + 80,
      motherY = childPos.y - 100;
    createPersonNode(fatherId, 'Père', 'M', fatherX, fatherY);
    createPersonNode(motherId, 'Mère', 'F', motherX, motherY);
    createUnionNode(unionId, unionX, unionY);
    edgesRef.current.add([{
      from: fatherId,
      to: unionId
    }, {
      from: motherId,
      to: unionId
    }, {
      from: unionId,
      to: selectedNodeId,
      arrows: 'to'
    }]);
    saveToLocalStorage();
    cancelAction();
    updateNodeStyles();
    showNotification('Parents ajoutés (père + mère)', 'success');
  }, [selectedNodeId, saveCurrentPositions, saveState, createPersonNode, createUnionNode, saveToLocalStorage, cancelAction, updateNodeStyles]);

  // --- Mode Père Seul : ajout direct du père (sans mère ni union) ---
  const executeAddSingleParent = useCallback(() => {
    if (!selectedNodeId) return;
    const fatherName = getInputValue('father-name', 'Père');
    const fatherGender = 'M';
    const fatherId = 'p_f_' + Date.now();
    saveCurrentPositions();
    saveState();
    const positions = networkRef.current?.getPositions() || {};
    const childPos = positions[selectedNodeId] || {
      x: 0,
      y: 0
    };
    const fatherX = childPos.x - 80,
      fatherY = childPos.y - 100;
    createPersonNode(fatherId, fatherName, fatherGender, fatherX, fatherY);
    edgesRef.current.add({
      from: fatherId,
      to: selectedNodeId,
      arrows: 'to'
    });
    saveToLocalStorage();
    cancelAction();
    updateNodeStyles();
    showNotification(`Père "${fatherName}" ajouté`, 'success');
  }, [selectedNodeId, saveCurrentPositions, saveState, createPersonNode, saveToLocalStorage, cancelAction, updateNodeStyles]);

  // --- Mode normal : ajout d'enfant via union (formulaire) ---
  const executeAddChild = useCallback(() => {
    if (!selectedNodeId) return;
    const childName = getInputValue('child-name', 'Nouvel Enfant');
    const childGender = getInputValue('child-gender', 'M');
    const childId = 'p_' + Date.now();
    saveCurrentPositions();
    saveState();
    const positions = networkRef.current?.getPositions() || {};
    const uPos = positions[selectedNodeId] || {
      x: 0,
      y: 0
    };
    const existingChildren = edgesRef.current.get({
      filter: item => item.from === selectedNodeId
    });
    let offsetX = 0;
    if (existingChildren.length) {
      const step = 160;
      const sign = existingChildren.length % 2 === 1 ? 1 : -1;
      const multiplier = Math.ceil(existingChildren.length / 2);
      offsetX = sign * multiplier * step;
    }
    const childX = uPos.x + offsetX,
      childY = uPos.y + 55;
    createPersonNode(childId, childName, childGender, childX, childY);
    edgesRef.current.add({
      from: selectedNodeId,
      to: childId,
      arrows: 'to'
    });
    saveToLocalStorage();
    setInputValue('child-name', '');
    cancelAction();
    updateNodeStyles();
    showNotification(`Enfant "${childName}" ajouté`, 'success');
  }, [selectedNodeId, saveCurrentPositions, saveState, createPersonNode, saveToLocalStorage, cancelAction, updateNodeStyles]);
  const updatePersonNameLive = useCallback(newName => {
    if (!selectedNodeId) return;
    nodesRef.current.update({
      id: selectedNodeId,
      label: newName
    });
    const titleEl = document.getElementById('person-title');
    if (titleEl) titleEl.innerText = newName;
    if (debounceTimerRef.current) clearTimeout(debounceTimerRef.current);
    debounceTimerRef.current = setTimeout(() => {
      saveToLocalStorage();
      saveState();
    }, 300);
  }, [selectedNodeId, saveToLocalStorage, saveState]);
  useEffect(() => {
    if (selectedNodeId && nodesRef.current) {
      const node = nodesRef.current.get(selectedNodeId);
      setEditingName(node?.label || '');
    } else {
      setEditingName('');
    }
  }, [selectedNodeId]);
  const exportToFile = useCallback(() => {
    if (!nodesRef.current || !edgesRef.current) return alert("Application non prête");
    const nodes = nodesRef.current.get();
    const edges = edgesRef.current.get();
    if (!nodes.length && !edges.length) return alert("Graphe vide");
    if (!window.confirm("Exporter le graphe au format JSON ?")) return;
    const data = {
      nodes,
      edges,
      exportDate: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {
      type: 'application/json'
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `genograph_export_${Date.now()}.json`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 150);
    showNotification('Export JSON effectué', 'success');
  }, []);
  const toggleDeleteMode = useCallback(() => {
    setDeleteMode(prev => !prev);
    showNotification(deleteMode ? 'Mode Gomme désactivé' : 'Mode Gomme activé – cliquez sur un nœud pour le supprimer', 'info');
  }, [deleteMode]);
  const toggleSingleParentMode = useCallback(() => {
    setSingleParentMode(prev => !prev);
    setShowChildGenderPicker(false);
    setPendingParentId(null);
    showNotification(singleParentMode ? 'Mode normal : ajout de parents complets (père+mère) et conjoints avec union' : 'Mode Père Seul : ajout rapide d\'un père direct ou d\'un enfant (choix Fils/Fille)', 'info');
  }, [singleParentMode]);

  // Génération de données démo (identique à avant, avec notification)
  const generateDemoData = useCallback(() => {
    if (!nodesRef.current || !edgesRef.current) return;
    if (nodesRef.current.get().length > 0 || edgesRef.current.get().length > 0) {
      if (!window.confirm("Générer un exemple remplacera le graphe actuel. Continuer ?")) return;
    }
    saveState();
    nodesRef.current.clear();
    edgesRef.current.clear();
    const addPerson = (id, label, gender, x, y) => {
      const color = gender === 'M' ? {
        background: '#1e3a8a',
        border: '#3b82f6'
      } : {
        background: '#701a75',
        border: '#ec4899'
      };
      nodesRef.current.add({
        id,
        label,
        shape: 'box',
        x,
        y,
        color,
        font: {
          color: '#fff',
          face: 'Tajawal'
        },
        gender
      });
    };
    const addUnion = (id, x, y) => {
      nodesRef.current.add({
        id,
        label: '',
        shape: 'dot',
        size: 7,
        color: '#10b981',
        x,
        y,
        font: {
          face: 'Tajawal'
        }
      });
    };
    addPerson('p1', 'Ahmed (Grand-père)', 'M', 0, -300);
    addPerson('p2', 'Fatima (Grand-mère)', 'F', 0, -220);
    addUnion('u1', 0, -260);
    edgesRef.current.add([{
      from: 'p1',
      to: 'u1'
    }, {
      from: 'p2',
      to: 'u1'
    }]);
    const children = [{
      id: 'c1',
      name: 'Mohamed (Oncle)',
      gender: 'M',
      x: -180,
      y: -140
    }, {
      id: 'c2',
      name: 'Khadija (Tante)',
      gender: 'F',
      x: 0,
      y: -140
    }, {
      id: 'c3',
      name: 'Ali (Père)',
      gender: 'M',
      x: 180,
      y: -140
    }];
    children.forEach(child => addPerson(child.id, child.name, child.gender, child.x, child.y));
    children.forEach(child => edgesRef.current.add({
      from: 'u1',
      to: child.id,
      arrows: 'to'
    }));
    const spouseOf = {
      c1: {
        name: 'Aisha',
        gender: 'F',
        x: -180,
        y: -60
      },
      c2: {
        name: 'Youssef',
        gender: 'M',
        x: 0,
        y: -60
      },
      c3: {
        name: 'Zineb',
        gender: 'F',
        x: 180,
        y: -60
      }
    };
    for (let [childId, spouse] of Object.entries(spouseOf)) {
      const spouseId = `sp_${childId}`;
      const unionId = `u_${childId}`;
      addPerson(spouseId, spouse.name, spouse.gender, spouse.x, spouse.y);
      addUnion(unionId, spouse.x + 20, spouse.y - 30);
      edgesRef.current.add([{
        from: childId,
        to: unionId
      }, {
        from: spouseId,
        to: unionId
      }]);
    }
    const generations = [{
      parentId: 'c1',
      offsetX: -180,
      offsetY: 20,
      childrenNames: ['Omar', 'Salma'],
      genders: ['M', 'F']
    }, {
      parentId: 'c2',
      offsetX: 0,
      offsetY: 20,
      childrenNames: ['Leila', 'Hassan'],
      genders: ['F', 'M']
    }, {
      parentId: 'c3',
      offsetX: 180,
      offsetY: 20,
      childrenNames: ['Yacine', 'Imane'],
      genders: ['M', 'F']
    }];
    let childCounter = 0;
    generations.forEach(gen => {
      const baseX = gen.offsetX;
      const baseY = gen.offsetY;
      const stepX = 60;
      gen.childrenNames.forEach((name, idx) => {
        const childId = `gc_${childCounter++}`;
        const childX = baseX + (idx === 0 ? -stepX : stepX);
        const childY = baseY;
        addPerson(childId, name, gen.genders[idx], childX, childY);
        const unionId = `u_${gen.parentId}`;
        edgesRef.current.add({
          from: unionId,
          to: childId,
          arrows: 'to'
        });
      });
    });
    const additionalPeople = [{
      label: 'Hamid (Frère)',
      gender: 'M',
      x: -280,
      y: -140
    }, {
      label: 'Nadia (Sœur)',
      gender: 'F',
      x: -80,
      y: -140
    }, {
      label: 'Rachid (Frère)',
      gender: 'M',
      x: 280,
      y: -60
    }, {
      label: 'Samira (Cousine)',
      gender: 'F',
      x: -280,
      y: 20
    }, {
      label: 'Karim (Cousin)',
      gender: 'M',
      x: 280,
      y: 20
    }, {
      label: 'Malika (Grand-tante)',
      gender: 'F',
      x: -300,
      y: -260
    }, {
      label: 'Tahar (Grand-oncle)',
      gender: 'M',
      x: 300,
      y: -260
    }];
    additionalPeople.forEach((p, idx) => addPerson(`add_${idx}`, p.label, p.gender, p.x, p.y));
    addUnion('u_add1', -280, -100);
    edgesRef.current.add([{
      from: 'add_0',
      to: 'u_add1'
    }, {
      from: 'c1',
      to: 'u_add1'
    }]);
    addUnion('u_add2', 280, -20);
    edgesRef.current.add([{
      from: 'add_2',
      to: 'u_add2'
    }, {
      from: 'sp_c3',
      to: 'u_add2'
    }]);
    saveToLocalStorage();
    cancelAction();
    if (networkRef.current) networkRef.current.fit({
      animation: {
        duration: 500
      }
    });
    updateNodeStyles();
    showNotification(`Exemple généré avec ${nodesRef.current.get().length} nœuds`, 'success');
  }, [saveState, saveToLocalStorage, cancelAction, updateNodeStyles]);

  // Chargement des librairies
  useEffect(() => {
    let tailwindLoaded = false,
      visLoaded = false;
    const checkReady = () => {
      if (tailwindLoaded && visLoaded) setLibsReady(true);
    };
